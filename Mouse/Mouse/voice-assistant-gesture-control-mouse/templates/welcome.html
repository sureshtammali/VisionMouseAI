<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - PIXEL Control System</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        .welcome-container {
            text-align: center;
            color: white;
            animation: fadeInUp 1s ease-out;
        }
        .logo {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }
        .title {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .subtitle {
            font-size: 1.5rem;
            opacity: 0.9;
            margin-bottom: 30px;
        }
        .loading {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        .countdown {
            font-size: 1.2rem;
            margin-top: 20px;
            opacity: 0.8;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }
        .particle {
            position: absolute;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }
    </style>
</head>
<body>
    <div class="particles">
        <div class="particle" style="left: 10%; width: 20px; height: 20px; animation-delay: 0s;"></div>
        <div class="particle" style="left: 20%; width: 15px; height: 15px; animation-delay: 1s;"></div>
        <div class="particle" style="left: 30%; width: 25px; height: 25px; animation-delay: 2s;"></div>
        <div class="particle" style="left: 40%; width: 18px; height: 18px; animation-delay: 3s;"></div>
        <div class="particle" style="left: 50%; width: 22px; height: 22px; animation-delay: 4s;"></div>
        <div class="particle" style="left: 60%; width: 16px; height: 16px; animation-delay: 5s;"></div>
        <div class="particle" style="left: 70%; width: 24px; height: 24px; animation-delay: 1.5s;"></div>
        <div class="particle" style="left: 80%; width: 19px; height: 19px; animation-delay: 2.5s;"></div>
        <div class="particle" style="left: 90%; width: 21px; height: 21px; animation-delay: 3.5s;"></div>
    </div>

    <div class="welcome-container">
        <div class="logo">
            <i class="fas fa-robot"></i>
        </div>
        <h1 class="title">Welcome to</h1>
        <h2 class="subtitle">Advanced Virtual Mouse</h2>
        <p style="font-size: 1.1rem; margin-bottom: 30px;">
            Experience the future of computer control with gesture and voice commands
        </p>
        <div class="loading"></div>
        <div class="countdown" id="countdown">Redirecting in 3 seconds...</div>
    </div>

    <script>
        let countdown = 3;
        const countdownElement = document.getElementById('countdown');
        
        const timer = setInterval(() => {
            countdown--;
            if (countdown > 0) {
                countdownElement.textContent = `Redirecting in ${countdown} seconds...`;
            } else {
                countdownElement.textContent = 'Redirecting now...';
                clearInterval(timer);
                window.location.href = '/login';
            }
        }, 1000);
        
        // Skip to login on click
        document.addEventListener('click', () => {
            clearInterval(timer);
            window.location.href = '/login';
        });
    </script>
</body>
</html>
