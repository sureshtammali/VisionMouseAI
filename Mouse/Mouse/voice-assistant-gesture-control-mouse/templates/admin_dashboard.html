<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - PIXEL Control System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .sidebar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .sidebar .nav-link { color: rgba(255,255,255,0.8); padding: 15px 20px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: white; background: rgba(255,255,255,0.1); }
        .main-content { padding: 20px; }
        .stat-card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .stat-icon { font-size: 2.5rem; }
        .table-container { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3 col-lg-2 px-0">
                <div class="sidebar">
                    <div class="p-4 text-center">
                        <h4 class="text-white"><i class="fas fa-robot"></i> PIXEL Admin</h4>
                    </div>
                    <nav class="nav flex-column">
                        <a class="nav-link active" href="#dashboard" onclick="showSection('dashboard')">
                            <i class="fas fa-tachometer-alt me-2"></i>Dashboard
                        </a>
                        <a class="nav-link" href="#contacts" onclick="showSection('contacts')">
                            <i class="fas fa-envelope me-2"></i>Contacts
                        </a>
                        <a class="nav-link" href="#users" onclick="showSection('users')">
                            <i class="fas fa-users me-2"></i>Users
                        </a>
                        <a class="nav-link" href="/logout">
                            <i class="fas fa-sign-out-alt me-2"></i>Logout
                        </a>
                    </nav>
                </div>
            </div>
            
            <!-- Main Content -->
            <div class="col-md-9 col-lg-10">
                <div class="main-content">
                    <!-- Dashboard Section -->
                    <div id="dashboard" class="content-section">
                        <h2 class="mb-4">Dashboard Overview</h2>
                        <div class="row mb-4">
                            <div class="col-md-3 mb-3">
                                <div class="stat-card text-center">
                                    <div class="stat-icon text-primary mb-2">
                                        <i class="fas fa-users"></i>
                                    </div>
                                    <h3 id="totalUsers">0</h3>
                                    <p class="text-muted">Total Users</p>
                                </div>
                            </div>
                            <div class="col-md-3 mb-3">
                                <div class="stat-card text-center">
                                    <div class="stat-icon text-success mb-2">
                                        <i class="fas fa-envelope"></i>
                                    </div>
                                    <h3 id="totalContacts">0</h3>
                                    <p class="text-muted">Contact Messages</p>
                                </div>
                            </div>
                            <div class="col-md-3 mb-3">
                                <div class="stat-card text-center">
                                    <div class="stat-icon text-warning mb-2">
                                        <i class="fas fa-robot"></i>
                                    </div>
                                    <h3>Active</h3>
                                    <p class="text-muted">System Status</p>
                                </div>
                            </div>
                            <div class="col-md-3 mb-3">
                                <div class="stat-card text-center">
                                    <div class="stat-icon text-info mb-2">
                                        <i class="fas fa-chart-line"></i>
                                    </div>
                                    <h3>100%</h3>
                                    <p class="text-muted">Uptime</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Contacts Section -->
                    <div id="contacts" class="content-section" style="display:none;">
                        <h2 class="mb-4">Contact Messages</h2>
                        <div class="table-container">
                            <div class="table-responsive">
                                <table class="table table-hover">
                                    <thead>
                                        <tr>
                                            <th>ID</th>
                                            <th>Name</th>
                                            <th>Email</th>
                                            <th>Subject</th>
                                            <th>Message</th>
                                            <th>Date</th>
                                        </tr>
                                    </thead>
                                    <tbody id="contactsTable">
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Users Section -->
                    <div id="users" class="content-section" style="display:none;">
                        <h2 class="mb-4">Registered Users</h2>
                        <div class="table-container">
                            <div class="table-responsive">
                                <table class="table table-hover">
                                    <thead>
                                        <tr>
                                            <th>ID</th>
                                            <th>Username</th>
                                            <th>Email</th>
                                            <th>Registration Date</th>
                                        </tr>
                                    </thead>
                                    <tbody id="usersTable">
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showSection(section) {
            document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
            document.getElementById(section).style.display = 'block';
            
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            event.target.classList.add('active');
            
            if (section === 'contacts') loadContacts();
            if (section === 'users') loadUsers();
        }
        
        function loadContacts() {
            fetch('/admin/contacts')
                .then(response => response.json())
                .then(data => {
                    const tbody = document.getElementById('contactsTable');
                    tbody.innerHTML = '';
                    data.contacts.forEach(contact => {
                        tbody.innerHTML += `
                            <tr>
                                <td>${contact[0]}</td>
                                <td>${contact[1]}</td>
                                <td>${contact[2]}</td>
                                <td>${contact[3]}</td>
                                <td>${contact[4].substring(0, 50)}...</td>
                                <td>${new Date(contact[6]).toLocaleDateString()}</td>
                            </tr>
                        `;
                    });
                    document.getElementById('totalContacts').textContent = data.contacts.length;
                });
        }
        
        function loadUsers() {
            fetch('/admin/users')
                .then(response => response.json())
                .then(data => {
                    const tbody = document.getElementById('usersTable');
                    tbody.innerHTML = '';
                    data.users.forEach(user => {
                        tbody.innerHTML += `
                            <tr>
                                <td>${user[0]}</td>
                                <td>${user[1]}</td>
                                <td>${user[2]}</td>
                                <td>${new Date(user[3]).toLocaleDateString()}</td>
                            </tr>
                        `;
                    });
                    document.getElementById('totalUsers').textContent = data.users.length;
                });
        }
        
        // Load initial data
        loadContacts();
        loadUsers();
    </script>
</body>
</html>
